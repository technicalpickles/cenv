[tools]
go = "1.26.1"

[tasks.build]
description = "Build cenv binary to ./cenv"
run = "go build -ldflags \"-X main.version=$(git describe --tags --always --dirty)\" -o cenv ./cmd/cenv"

[tasks.install]
description = "Install cenv to $GOBIN (or $GOPATH/bin)"
run = "go install -ldflags \"-X main.version=$(git describe --tags --always --dirty)\" ./cmd/cenv"

[tasks.test]
description = "Run tests"
run = "go test ./..."

[tasks.fmt]
description = "Format Go code"
run = "go fmt ./..."

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks.check]
description = "Run fmt, vet, and tests"
depends = ["fmt", "vet", "test"]
