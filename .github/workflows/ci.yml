name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so pushes don't pile up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Caches the mise-installed Go toolchain itself.
      - uses: jdx/mise-action@v2

      - name: Determine Go cache paths
        id: go-cache
        run: |
          echo "gocache=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"
          echo "gomodcache=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"

      # Caches downloaded modules + build cache, keyed on go.sum.
      - uses: actions/cache@v4
        with:
          path: |
            ${{ steps.go-cache.outputs.gocache }}
            ${{ steps.go-cache.outputs.gomodcache }}
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-${{ runner.os }}-

      - name: Format check
        run: |
          mise run fmt
          git diff --exit-code

      - name: Vet
        run: mise run vet

      - name: Test
        run: mise run test
